version: 0.1
cli:
  version: 1.25.0
  options:
    # Keep trunk check non-interactive by default so fixes are always explicit.
    - commands:
        - check
      args: -n
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - bandit
    - oxipng
    - pylint
    - pyright
    - renovate
  ignore:
    - linters: [ALL]
      paths:
        # Ignore generated files
        - meshtastic/**/*_pb2.py
        - meshtastic/**/*_pb2.pyi
        - meshtastic/tests/api_baselines/*.json
        # Ignore external protobufs submodule content in this repo's lint scope.
        - protobufs/**
        # Keep project license text untouched by automated lint/format tools.
        - LICENSE.md
    - linters: [mypy-poetry]
      paths:
        # Keep Trunk's mypy scope aligned with CI (meshtastic/ only).
        - examples/**
        - tests/**
        - meshtastic/tests/**
    - linters: [pylint-poetry]
      paths:
        # Keep Trunk's pylint scope aligned with CI (meshtastic/ + examples/).
        - tests/**
        - meshtastic/tests/**
  definitions:
    - name: mypy-poetry
      description: Run mypy via Poetry using the project's pinned dependencies.
      files: [python, python-interface]
      suggest_if: files_present
      direct_configs:
        - pyproject.toml
        - mypy.ini
        - .mypy.ini
      commands:
        - name: lint
          output: mypy
          run: poetry -C ${workspace} run mypy meshtastic/ --strict --exclude '^meshtastic/tests/'
          target: meshtastic
          run_from: ${root_or_parent_with_any_config}
          disable_upstream: true
          success_codes: [0, 1]
          batch: true
          stdin: false
    - name: pylint-poetry
      description: Run pylint via Poetry with the project's CI arguments.
      files: [python]
      suggest_if: files_present
      direct_configs:
        - pyproject.toml
        - pylintrc
        - .pylintrc
      commands:
        - name: lint
          output: pylint
          run: poetry -C ${workspace} run pylint meshtastic examples/ --exit-zero --ignore-patterns='.*_pb2.py,.*_pb2.pyi' --ignore-paths='^meshtastic/tests/|^meshtastic/protobuf/.*_pb2\\.pyi?$' --output ${tmpfile} --output-format json
          target: meshtastic
          read_output_from: tmp_file
          run_from: ${root_or_parent_with_any_config}
          disable_upstream: true
          success_codes: [0]
          batch: true
          stdin: false
  enabled:
    - grype@0.110.0
    - actionlint@1.7.12
    - black@26.5.1
    - checkov@3.2.531
    - git-diff-check
    - gitleaks@8.30.1
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - prettier@3.8.3
    - ruff@0.15.15
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trivy@0.70.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
    - mypy-poetry
    - pylint-poetry
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available

name: Docker Build and Publish

on:
  workflow_dispatch: {}
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jeremiah-k/mtjk

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    if: ${{ github.ref_name != 'master' && (github.event_name != 'release' || github.event.release.target_commitish != 'master') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Extract version and build info
        id: get_version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(python3 -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['tool']['poetry']['version'])")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

          VCS_REF=$(git rev-parse HEAD)
          echo "vcs_ref=$VCS_REF" >> "$GITHUB_OUTPUT"

          GIT_SHA=$(git rev-parse --short HEAD)
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" == "release" ]; then
            echo "docker_tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "should_tag_latest=true" >> "$GITHUB_OUTPUT"
          else
            BRANCH_NAME="$(printf '%s' "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')"
            echo "docker_tag=$VERSION-dev-$BRANCH_NAME-$GIT_SHA" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "should_tag_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          driver-opts: |
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.docker_tag }}
            type=raw,value=latest,enable=${{ steps.get_version.outputs.should_tag_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=mtjk
            org.opencontainers.image.description=Python API and CLI for Meshtastic devices (mtjk fork)
            org.opencontainers.image.url=https://github.com/jeremiah-k/mtjk
            org.opencontainers.image.source=https://github.com/jeremiah-k/mtjk
            org.opencontainers.image.licenses=GPL-3.0-only
            org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.get_version.outputs.vcs_ref }}
            org.opencontainers.image.created=${{ steps.get_version.outputs.build_date }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.get_version.outputs.build_date }}
            VCS_REF=${{ steps.get_version.outputs.vcs_ref }}
            VERSION=${{ steps.get_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

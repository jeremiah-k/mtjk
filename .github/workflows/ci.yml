name: CI
on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
      - "**-review"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CI_ASSERT_MODULE_STATE_DRIFT: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - &checkout_step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - &setup_python_step
        name: Install Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - &cache_poetry_step
        name: Cache Poetry artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-${{ env.PYTHON_VERSION }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.PYTHON_VERSION }}-poetry-
            ${{ runner.os }}-poetry-
      - &install_dependencies_step
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"
      - &install_local_step
        name: Install meshtastic from local
        run: |
          poetry install ${{ env.POETRY_INSTALL_ARGS }}
          poetry run meshtastic --version
      - name: Run tests with pytest
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            poetry run pytest --cov=meshtastic --cov-report=xml --junitxml=junit.xml
          else
            poetry run pytest --cov=meshtastic --junitxml=junit.xml
          fi
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jeremiah-k/mtjk
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jeremiah-k/mtjk
          files: ./junit.xml
          report_type: test_results
          fail_ci_if_error: false
  pylint:
    name: Pylint (py3.13)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Run pylint
        run: poetry run pylint meshtastic examples/ --ignore-patterns ".*_pb2\.pyi?$"
  ruff-tests:
    name: Ruff Tests (py3.13)
    runs-on: ubuntu-latest
    steps:
      - *checkout_step
      - *setup_python_step
      - name: Install ruff
        run: python -m pip install --upgrade "ruff==0.15.10"
      - name: Run ruff on tests
        run: ruff check meshtastic/tests
  mypy:
    name: Mypy (py3.13)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Check types with mypy
        run: poetry run mypy meshtastic/
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - *checkout_step
      - name: Lint shell scripts
        run: shellcheck bin/*.sh

  compatibility:
    name: Compatibility Inventory (py3.13)
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Validate compatibility markers inventory
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg -n "COMPAT_STABLE_SHIM|COMPAT_DEPRECATE" meshtastic
          else
            grep -R -nE "COMPAT_STABLE_SHIM|COMPAT_DEPRECATE" meshtastic
          fi
      - name: Run compatibility alias checks
        run: |
          poetry run pytest \
            tests/test_ble_naming_compatibility.py \
            tests/test_ble_runner.py::TestBLECoroutineRunner::test_run_coroutine_threadsafe_timeout_alias_warns_deprecated \
            tests/test_ble_runner.py::TestBLECoroutineRunner::test_run_coroutine_threadsafe_timeout_alias_warns_once \
            meshtastic/tests/test_init.py::test_init_serial_alias_points_to_pyserial_module \
            meshtastic/tests/test_mt_config.py \
            meshtastic/tests/test_util.py::test_dotdict_deprecated_warns \
            meshtastic/tests/test_powermon_power_supply.py::test_deprecated_current_aliases_warn_once_per_method \
            meshtastic/tests/test_slog_power_logger.py::test_root_dir_legacy_alias_warns_once \
            meshtastic/tests/test_slog_power_logger.py::test_store_current_reading_warns_once_when_voltage_unavailable \
            meshtastic/tests/test_mesh_interface.py::test_sendPacket_alias_with_destination_as_int \
            meshtastic/tests/test_mesh_interface.py::test_sendPacket_alias_with_no_destination \
            meshtastic/tests/test_mesh_interface.py::test_send_telemetry_supported_and_fallback_paths
  meshtasticd-integration:
    name: meshtasticd Integration (py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
      MESHTASTICD_IMAGE: meshtastic/meshtasticd:2.7.25-alpha-debian@sha256:4b3406034d975538d80aad58134a6c6cb4faabf1773cd8d8372809d1af5d82ad
      MESHTASTICD_HOST: localhost:4401
      MESHTASTICD_PORT: "4401"
      MESHTASTICD_READY_TIMEOUT_SECONDS: "180"
      MESHTASTICD_LOG_ON_SUCCESS: "true"
      MESHTASTICD_LOG_DIR: ${{ github.workspace }}/.meshtasticd-logs/single
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Run meshtasticd integration tests against simulator
        run: ./bin/run-smokevirt-with-meshtasticd.sh
      - name: Summarize meshtasticd integration logs
        if: always()
        run: |
          bash ./bin/summarize-meshtasticd-logs.sh \
            "meshtasticd Integration Summary" \
            "./bin/run-smokevirt-with-meshtasticd.sh" \
            "${MESHTASTICD_LOG_DIR}" \
            single >>"${GITHUB_STEP_SUMMARY}"
      - name: Upload meshtasticd integration logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meshtasticd-integration-logs
          path: ${{ env.MESHTASTICD_LOG_DIR }}
          if-no-files-found: warn
  meshtasticd-multinode-integration:
    name: meshtasticd Multinode Integration (py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: "3.13"
      POETRY_INSTALL_ARGS: --all-extras --with dev,powermon
      MESHTASTICD_IMAGE: meshtastic/meshtasticd:2.7.25-alpha-debian@sha256:4b3406034d975538d80aad58134a6c6cb4faabf1773cd8d8372809d1af5d82ad
      MESHTASTICD_READY_TIMEOUT_SECONDS: "180"
      MESHTASTICD_HOST_A: localhost:4401
      MESHTASTICD_HOST_B: localhost:4402
      MESHTASTICD_PORT_A: "4401"
      MESHTASTICD_PORT_B: "4402"
      MESHTASTICD_HWID_A: "11"
      MESHTASTICD_HWID_B: "22"
      MESHTASTICD_LOG_ON_SUCCESS: "true"
      MESHTASTICD_LOG_DIR: ${{ github.workspace }}/.meshtasticd-logs/multinode
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step
      - name: Run dual-daemon meshtasticd integration tests
        run: ./bin/run-multinode-with-meshtasticd.sh
      - name: Summarize meshtasticd multinode logs
        if: always()
        run: |
          bash ./bin/summarize-meshtasticd-logs.sh \
            "meshtasticd Multinode Summary" \
            "./bin/run-multinode-with-meshtasticd.sh" \
            "${MESHTASTICD_LOG_DIR}" \
            multinode >>"${GITHUB_STEP_SUMMARY}"
      - name: Upload meshtasticd multinode logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meshtasticd-multinode-logs
          path: ${{ env.MESHTASTICD_LOG_DIR }}
          if-no-files-found: warn
  # Fast install sanity check across Python versions.
  # Full tests run in the tests job above.
  # Lint/type checks run in dedicated jobs for earlier independent failures.
  validate:
    name: Validate install (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}
      # Validate base package installs without extras.
      POETRY_INSTALL_ARGS: ""
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - *checkout_step
      - *setup_python_step
      - *cache_poetry_step
      - *install_dependencies_step
      - *install_local_step

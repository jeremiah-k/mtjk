name: Build and Upload Release Assets

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "${TAG}" ]]; then
            echo "::error::Unable to resolve release tag."
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==2.3.2"

      - name: Build standalone assets
        run: bin/build-bin.sh

      - name: Prepare release asset names
        run: |
          test -f dist/meshtastic || { echo "::error::Missing dist/meshtastic build artifact."; exit 1; }
          test -f standalone_readme.txt || { echo "::error::Missing standalone_readme.txt artifact."; exit 1; }
          cp dist/meshtastic dist/meshtastic_ubuntu
          cp standalone_readme.txt dist/readme.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standalone-release-assets-${{ steps.release_tag.outputs.tag }}
          path: |
            dist/meshtastic_ubuntu
            dist/readme.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            dist/meshtastic_ubuntu
            dist/readme.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
